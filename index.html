<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover" />
    <meta name="theme-color" content="#050e05" />
    <!-- FIX: makes sure this HTML shell is always revalidated, never served
         stale from any HTTP cache (proxy/CDN/WebView) — pairs with the
         cacheMode="LOAD_DEFAULT" fix in mobile/EcoWorldScreen.tsx. Only this
         tiny document is affected; Vite's content-hashed JS/CSS chunks below
         are unaffected and still cache long-term, so this costs nothing. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>EcoWorld — EcoQuest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body,
        #root {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #050e05;
            color: #ffffff;
        }

        canvas {
            display: block;
            outline: none;
        }

        /* Hide scrollbars globally */
        ::-webkit-scrollbar {
            width: 0;
            height: 0;
        }

        /* Prevent text selection on UI */
        * {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>

</html>
